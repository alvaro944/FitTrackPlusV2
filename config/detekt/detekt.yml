# Detekt configuration for FitTrackPlus v2
# Kotlin 2.1 + Jetpack Compose + Hilt
# Rules adjusted for Compose idioms (PascalCase composables, dp literals, long parameter lists).

build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false
  AbsentOrWrongFileLicense:
    active: false
  EndOfSentenceFormat:
    active: false

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    ignoreSingleWhenExpression: true
  LargeClass:
    active: true
    threshold: 600
  LongMethod:
    active: true
    threshold: 80
    ignoreAnnotated:
      - 'Composable'   # Compose functions are legitimately long
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - 'Composable'      # Composables pass down many lambdas
      - 'HiltViewModel'   # ViewModels receive all deps via constructor
  TooManyFunctions:
    active: true
    thresholdInFiles: 25
    thresholdInClasses: 25
    thresholdInInterfaces: 15
    thresholdInObjects: 25
    thresholdInEnums: 10
  ComplexInterface:
    active: false
  StringLiteralDuplication:
    active: false
  NestedBlockDepth:
    active: true
    threshold: 5

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'NullPointerException'
      - 'IndexOutOfBoundsException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  PrintStackTrace:
    active: true
  NotImplementedDeclaration:
    active: false  # error("Not used") is common in test fakes

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    ignoreAnnotated:
      - 'Composable'  # Composable functions use PascalCase by convention
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    privateParameterPattern: '[a-z][A-Za-z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
  EnumNaming:
    active: true
    enumEntryPattern: '[A-Z][_a-zA-Z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true
  BooleanPropertyNaming:
    active: false
  InvalidPackageDeclaration:
    active: false

performance:
  active: true
  ForEachOnRange:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true
  SpreadOperator:
    active: false  # Used in some Gradle DSL patterns
  ArrayPrimitive:
    active: true

potential-bugs:
  active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  EqualsWithHashCodeExist:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  InvalidRange:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  MapGetWithNotNullAssertionOperator:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnnecessaryNotNullOperator:
    active: true
  UnnecessarySafeCall:
    active: true
  UnreachableCatchBlock:
    active: true
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true
  WrongEqualsTypeParameter:
    active: true
  DoubleMutabilityForCollection:
    active: true
  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'
  CastToNullableType:
    active: false
  HasPlatformType:
    active: false
  LateinitUsage:
    active: false

style:
  active: true
  MagicNumber:
    active: false  # Compose layouts use many dp/alpha/weight literals
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeRawStrings: true
  ReturnCount:
    active: true
    max: 4
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: true
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Resolve before shipping.'
        value: 'STOPSHIP:'
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.android.synthetic.*'
  NewLineAtEndOfFile:
    active: true
  MayBeConst:
    active: true
  ModifierOrder:
    active: true
  ObjectLiteralToLambda:
    active: true
  OptionalAbstractKeyword:
    active: true
  RedundantHigherOrderMapUsage:
    active: true
  UnnecessaryApply:
    active: true
  UnnecessaryFilter:
    active: true
  UnnecessaryInheritance:
    active: true
  UnusedPrivateClass:
    active: true
  UnusedPrivateMember:
    active: true
    allowedNames: ''
    ignoreAnnotated:
      - 'Preview'
  UseAnyOrNoneInsteadOfFind:
    active: true
  UseCheckNotNull:
    active: true
  UseCheckOrError:
    active: true
  UseIsNullOrEmpty:
    active: true
  UseOrEmpty:
    active: true
  UseRequire:
    active: true
  UseRequireNotNull:
    active: true
  SafeCast:
    active: true
  EqualsNullCall:
    active: true
  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 2
  ThrowsCount:
    active: true
    max: 2
    excludeGuardClauses: true
  DataClassContainsFunctions:
    active: false
  ForbiddenVoid:
    active: false
  ExpressionBodySyntax:
    active: false
  CollapsibleIfStatements:
    active: false
  UnusedImports:
    active: false  # Covered by IDE and Kotlin compiler
