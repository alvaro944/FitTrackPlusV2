name: Release Preview APK

on:
  push:
    tags:
      - 'v*-preview*'

permissions:
  contents: write

jobs:
  release-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build preview APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FitTrackPlus-preview.apk
          ls -lh app/build/outputs/apk/debug

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitTrackPlus-preview-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/FitTrackPlus-preview.apk
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/debug/FitTrackPlus-preview.apk

