<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FitTrackPlus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="mock-data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

/* Scrollbar */
::-webkit-scrollbar { width: 0px; }

/* Theme variables */
:root {
  --bg: #F4F4F1;
  --surface: #FCFBF7;
  --surface-alt: #E8E5DD;
  --surface-alt2: #DDD9CF;
  --border: #D5D0C5;
  --text: #161816;
  --text2: #5E655F;
  --text3: #9AA09B;
  --primary: #1F6B57;
  --primary-dark: #174D40;
  --primary-soft: #D9E8E1;
  --primary-subtle: #EBF3EF;
  --copper: #C47A49;
  --copper-soft: #F0E0D3;
  --error: #B15249;
  --error-soft: #F2DED9;
  --shadow-sm: 0 1px 3px rgba(22,24,22,0.06);
  --shadow-md: 0 4px 16px rgba(22,24,22,0.08);
  --shadow-lg: 0 8px 32px rgba(22,24,22,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;
  --nav-height: 80px;
  --font-mono: 'JetBrains Mono', monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #181A18;
  --surface: #1F221F;
  --surface-alt: #272A27;
  --surface-alt2: #2E312E;
  --border: #353835;
  --text: #EEF0EE;
  --text2: #8A928B;
  --text3: #5E655F;
  --primary: #2E8B6E;
  --primary-dark: #3AA882;
  --primary-soft: #1A3830;
  --primary-subtle: #162D26;
  --copper: #D4895A;
  --copper-soft: #2D2018;
  --error: #C96260;
  --error-soft: #2D1919;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

.ft-app {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-height) + 16px);
}

.screen-full {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* Typography */
.t-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
.t-h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.t-h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.t-body { font-size: 15px; font-weight: 400; line-height: 1.5; }
.t-small { font-size: 13px; line-height: 1.4; }
.t-tiny { font-size: 11px; letter-spacing: 0.2px; }
.t-label { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
.t-mono { font-family: var(--font-mono); }
.t-secondary { color: var(--text2); }
.t-primary { color: var(--primary); }
.t-copper { color: var(--copper); }
.t-error { color: var(--error); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 12px 20px; border-radius: var(--radius-md);
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: var(--transition);
  -webkit-tap-highlight-color: transparent; user-select: none;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--surface-alt); color: var(--text); }
.btn-secondary:hover { background: var(--surface-alt2); }
.btn-ghost { background: transparent; color: var(--text2); padding: 8px 12px; }
.btn-ghost:hover { background: var(--surface-alt); color: var(--text); }
.btn-danger { background: var(--error-soft); color: var(--error); }
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: var(--radius-sm); }
.btn-icon { padding: 10px; border-radius: var(--radius-sm); }
.btn-full { width: 100%; }
.btn-copper { background: var(--copper); color: #fff; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 16px;
}

/* Inputs */
.input {
  width: 100%;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
.input:focus { border-color: var(--primary); background: var(--surface); }
.input::placeholder { color: var(--text3); }
.input-mono { font-family: var(--font-mono); font-size: 16px; text-align: center; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* Page header */
.page-header {
  padding: 20px 20px 12px;
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
}
.page-header-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.7px;
  color: var(--text);
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
}
.badge-primary { background: var(--primary-soft); color: var(--primary); }
.badge-copper { background: var(--copper-soft); color: var(--copper); }
.badge-error { background: var(--error-soft); color: var(--error); }
.badge-neutral { background: var(--surface-alt); color: var(--text2); }
.badge-pr { background: var(--copper-soft); color: var(--copper); font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; }

/* Nav */
.bottom-nav {
  height: var(--nav-height);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom, 8px);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 8px 4px;
  cursor: pointer; border-radius: var(--radius-sm);
  transition: var(--transition); position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nav-item:active { background: var(--surface-alt); }
.nav-icon { width: 24px; height: 24px; color: var(--text3); transition: var(--transition); }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text3); transition: var(--transition); letter-spacing: 0.2px; }
.nav-item.active .nav-icon { color: var(--primary); }
.nav-item.active .nav-label { color: var(--primary); font-weight: 600; }
.nav-dot {
  position: absolute; top: 6px; right: calc(50% - 14px);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--copper);
}

/* Skeleton */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-alt) 25%, var(--surface-alt2) 50%, var(--surface-alt) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}

/* Transitions */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.anim-fade-up { animation: fadeSlideUp 0.3s cubic-bezier(0.4,0,0.2,1) both; }
.anim-fade { animation: fadeIn 0.3s ease both; }
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.anim-slide-right { animation: slideInRight 0.28s cubic-bezier(0.32,0.72,0,1) both; }

/* Toast */
.toast {
  position: fixed; bottom: calc(var(--nav-height) + 16px); left: 50%;
  transform: translateX(-50%) translateY(0);
  background: var(--text); color: var(--surface);
  padding: 10px 20px; border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 500;
  z-index: 1000; pointer-events: none;
  transition: opacity 0.3s ease;
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}

/* Timer radial */
.timer-ring { transform-origin: center; }

/* PR Confetti */
@keyframes confetti-fall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120px) rotate(720deg); opacity: 0; }
}
.confetti-particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 1px;
  animation: confetti-fall 1.2s ease-out forwards;
  pointer-events: none;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Scrollable list */
.list-scroll { overflow-y: auto; height: 100%; }

/* Section label */
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--text3);
  padding: 0 20px; margin-bottom: 8px; margin-top: 20px;
}

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid transparent;
  transition: var(--transition); user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.chip-active { background: var(--primary); color: #fff; }
.chip-inactive { background: var(--surface-alt); color: var(--text2); border-color: var(--border); }
.chip-inactive:active { background: var(--surface-alt2); }

/* Delta */
.delta-up { color: var(--primary); }
.delta-down { color: var(--error); }
.delta-same { color: var(--text3); }

/* Floating island */
.floating-island {
  position: fixed;
  bottom: calc(var(--nav-height) + 16px);
  left: 50%; transform: translateX(-50%);
  background: var(--text);
  color: var(--surface);
  border-radius: var(--radius-pill);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  white-space: nowrap;
  min-width: 200px;
}

/* Settings row */
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.settings-row:last-child { border-bottom: none; }

/* Toggle */
.toggle {
  width: 48px; height: 28px; border-radius: 14px;
  background: var(--surface-alt2); position: relative;
  cursor: pointer; transition: var(--transition);
  border: none; flex-shrink: 0;
}
.toggle.on { background: var(--primary); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; border-radius: 50%;
  background: white; transition: var(--transition);
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.toggle.on::after { left: 23px; }

/* Chart tooltip */
.chart-tooltip {
  position: absolute;
  background: var(--text);
  color: var(--surface);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  pointer-events: none;
  z-index: 20;
  white-space: nowrap;
  transform: translate(-50%, -110%);
  box-shadow: var(--shadow-md);
}

/* Workout set row */
.set-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr 32px;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
}
.set-row .set-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text3);
  text-align: center;
}

/* Heatmap */
.heatmap-cell {
  width: 10px; height: 10px; border-radius: 2px;
  flex-shrink: 0;
}

/* Number input group */
.num-input-group {
  display: flex; align-items: center; gap: 0;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.num-input-group input {
  background: transparent; border: none; outline: none;
  font-family: var(--font-mono); font-size: 20px; font-weight: 600;
  color: var(--text); text-align: center; width: 64px; padding: 10px 4px;
}
.num-input-btn {
  width: 40px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2);
  font-size: 20px; font-weight: 300;
  background: transparent; border: none;
  transition: var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.num-input-btn:active { background: var(--surface-alt2); color: var(--text); }

/* Week strip */
.week-strip {
  display: flex; gap: 6px; padding: 0 20px;
  overflow-x: auto; scrollbar-width: none;
}
.week-strip::-webkit-scrollbar { display: none; }
.week-day {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; flex-shrink: 0;
}
.week-day.done { background: var(--primary-subtle); }
.week-day.today { background: var(--primary); }
.week-day.today .wd-label, .week-day.today .wd-num { color: #fff; }
.wd-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: var(--text3); text-transform: uppercase; }
.wd-num { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text); }

/* Exercise accordion */
.exercise-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.exercise-header:last-child { border-bottom: none; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; padding: 48px 32px; text-align: center;
}

/* Segment control */
.segment-control {
  display: flex;
  background: var(--surface-alt);
  border-radius: var(--radius-sm);
  padding: 3px; gap: 2px;
}
.segment-btn {
  flex: 1; padding: 8px 12px;
  border-radius: 6px; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  background: transparent; color: var(--text2);
  -webkit-tap-highlight-color: transparent;
}
.segment-btn.active {
  background: var(--surface); color: var(--text);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

/* Metric card */
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.metric-value {
  font-family: var(--font-mono);
  font-size: 26px; font-weight: 600;
  color: var(--text); letter-spacing: -1px;
}
.metric-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.metric-delta { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }

/* Pill selector */
.pill-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.pill {
  padding: 6px 14px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--surface-alt); color: var(--text2);
  transition: var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.pill.selected { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); font-weight: 600; }
.pill:active { opacity: 0.7; }

/* Slide container for screen transitions */
.slide-container {
  position: absolute; inset: 0;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
}
.slide-enter { transform: translateX(24px); opacity: 0; }
.slide-exit { transform: translateX(-24px); opacity: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app-shell.jsx"></script>
</body>
</html>
